<svg xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" viewBox="0 0 800 1600" width="800" height="1600" data-block-variant="union"><title>Chaise Lounge</title><desc>Two-block chaise: seat area unioned with backrest to form a single contiguous furniture outline.</desc><g><path d="M 0 400 L 800 400 L 800 1600 L 0 1600 Z" fill="#8a8680" stroke="#2c2a28" stroke-width="12" id="seat-block" class="chaise-lounge-001"/><path d="M 0 0 L 800 0 L 800 420 L 0 420 Z" fill="#96928a" stroke="#2c2a28" stroke-width="12" id="backrest-block" class="chaise-lounge-001"/></g></svg>
