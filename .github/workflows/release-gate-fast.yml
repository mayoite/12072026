name: Release gate (fast)

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: release-gate-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Prefer root package.json packageManager only — do not also pass "version"
      # (action treats 11.13.0 vs pnpm@11.13.0+sha512… as multiple versions).
      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release gate (fast)
        run: |
          mkdir -p results/tooling
          pnpm run release:gate:fast 2>&1 | tee results/tooling/phase09-gate-fast.log

      - name: Upload fast gate log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-fast-log
          path: results/tooling/phase09-gate-fast.log
          if-no-files-found: ignore
