name: Tech docs

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tech-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Prefer root package.json packageManager only — do not also pass "version"
      # (action treats 11.13.0 vs pnpm@11.13.0+sha512… as multiple versions).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tech docs gate
        run: pnpm run tech-docs:gate

      - name: Upload tech docs site
        uses: actions/upload-artifact@v4
        with:
          name: tech-docs-site
          path: generated-documents/site/
