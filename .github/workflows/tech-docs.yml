name: Tech docs

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/tech-docs.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'site/**'
      - 'tech-docs-generator/**'
  pull_request:
    paths:
      - '.github/workflows/tech-docs.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'site/**'
      - 'tech-docs-generator/**'
  workflow_dispatch:

concurrency:
  group: tech-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tech docs gate
        run: pnpm run tech-docs:gate

      - name: Upload tech docs site
        uses: actions/upload-artifact@v4
        with:
          name: tech-docs-site
          path: generated-documents/site/
