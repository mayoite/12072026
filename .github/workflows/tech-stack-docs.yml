name: Tech stack docs

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/tech-stack-docs.yml'
      - 'Documents/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'site/**'
      - 'tech-stack-generator/**'
  pull_request:
    paths:
      - '.github/workflows/tech-stack-docs.yml'
      - 'Documents/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'site/**'
      - 'tech-stack-generator/**'
  workflow_dispatch:

concurrency:
  group: tech-stack-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Tech stack docs gate
        run: pnpm run docs:gate:tech-stack
