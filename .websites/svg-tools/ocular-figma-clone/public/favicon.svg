<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Eye outline: lens / almond shape -->
  <path
    d="M 5,32 C 18,7 46,7 59,32 C 46,57 18,57 5,32 Z"
    stroke="oklch(0.7214 0.1337 49.9802)"
    stroke-width="2.25"
    stroke-linejoin="round"
  />

  <!-- Iris ring -->
  <circle cx="32" cy="32" r="12" stroke="oklch(0.7214 0.1337 49.9802)" stroke-width="1.75" />

  <!-- Vector anchor nodes (filled squares) at N / E / S / W of iris -->
  <!-- These sit exactly on the iris circumference — like Figma/Illustrator anchor points -->
  <!-- N: (32, 20) -->
  <rect x="29.5" y="17.5" width="5" height="5" rx="0.75" fill="oklch(0.7214 0.1337 49.9802)" />
  <!-- E: (44, 32) -->
  <rect x="41.5" y="29.5" width="5" height="5" rx="0.75" fill="oklch(0.7214 0.1337 49.9802)" />
  <!-- S: (32, 44) -->
  <rect x="29.5" y="41.5" width="5" height="5" rx="0.75" fill="oklch(0.7214 0.1337 49.9802)" />
  <!-- W: (20, 32) -->
  <rect x="17.5" y="29.5" width="5" height="5" rx="0.75" fill="oklch(0.7214 0.1337 49.9802)" />

  <!-- Pupil -->
  <circle cx="32" cy="32" r="5" fill="oklch(0.7214 0.1337 49.9802)" />

  <!-- Lens glint — subtle optical highlight -->
  <circle cx="26.5" cy="26.5" r="1.75" fill="oklch(0.7214 0.1337 49.9802)" opacity="0.45" />
</svg>
